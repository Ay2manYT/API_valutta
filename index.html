<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valuta Kalkulator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>Valuta Kalkulator</h1>
    <p id="tekst"></p>

    <label for="amount">Beløp</label>
    <input type="number" id="amount" placeholder="Skriv beløp" min="0">

    <label for="fromCurrency">Fra</label>
    <select id="fromCurrency">
        <option value="USD">US Dollar (USD)</option>
        <option value="NOK">Norske Kroner (NOK)</option>
        <option value="EUR">Euro (EUR)</option>
    </select>

    <label for="toCurrency">Til</label>
    <select id="toCurrency">
        <option value="NOK">Norske Kroner (NOK)</option>
        <option value="USD">US Dollar (USD)</option>
        <option value="EUR">Euro (EUR)</option>
    </select>

    <button id="convertBtn">Konverter</button>

    <h2 id="result"></h2>
</div>

<script src="script.js"></script>
</body>
</html>
